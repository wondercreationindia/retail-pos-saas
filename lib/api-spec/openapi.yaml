openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Retail POS SaaS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: tenants
    description: Tenant management
  - name: users
    description: User management
  - name: products
    description: Product catalog
  - name: categories
    description: Product categories
  - name: orders
    description: Sales orders
  - name: dashboard
    description: Dashboard analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new tenant and admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /tenants/current:
    get:
      operationId: getCurrentTenant
      tags: [tenants]
      summary: Get the current tenant info
      responses:
        "200":
          description: Tenant info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update the current tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users for the tenant
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all product categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a product category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryUpdate"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, completed, cancelled, refunded]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderUpdate"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [dashboard]
      summary: Get recent orders for the dashboard
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /dashboard/sales-by-day:
    get:
      operationId: getSalesByDay
      tags: [dashboard]
      summary: Get sales grouped by day (last 7 days)
      responses:
        "200":
          description: Sales by day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesByDay"

  /dashboard/top-products:
    get:
      operationId: getTopProducts
      tags: [dashboard]
      summary: Get top selling products
      responses:
        "200":
          description: Top products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopProduct"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6

    RegisterInput:
      type: object
      required: [email, password, name, businessName]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        name:
          type: string
        businessName:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    Tenant:
      type: object
      required: [id, name, slug, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: ["string", "null"]
        currency:
          type: string
        timezone:
          type: string
        createdAt:
          type: string
          format: date-time

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        logoUrl:
          type: ["string", "null"]
        currency:
          type: string
        timezone:
          type: string

    User:
      type: object
      required: [id, tenantId, email, name, role, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        email:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, cashier]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UserInput:
      type: object
      required: [email, name, role, password]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, cashier]
        password:
          type: string
          minLength: 6

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [admin, manager, cashier]
        isActive:
          type: boolean

    Category:
      type: object
      required: [id, tenantId, name, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    CategoryInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        color:
          type: string

    CategoryUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        color:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, tenantId, name, price, stock, isActive, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        hsnCode:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        weight:
          type: ["number", "null"]
          format: float
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        price:
          type: number
          format: float
        salePrice:
          type: ["number", "null"]
          format: float
        mrp:
          type: ["number", "null"]
          format: float
        purchasePrice:
          type: ["number", "null"]
          format: float
        costPrice:
          type: ["number", "null"]
          format: float
        gstRate:
          type: ["number", "null"]
          format: float
        stock:
          type: integer
        minStockAlert:
          type: ["integer", "null"]
        maxStock:
          type: ["integer", "null"]
        trackInventory:
          type: boolean
        allowNegativeStock:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        publishOnline:
          type: boolean
        featuredProduct:
          type: boolean
        barcodeType:
          type: ["string", "null"]
        labelWidth:
          type: ["number", "null"]
          format: float
        labelHeight:
          type: ["number", "null"]
          format: float
        isActive:
          type: boolean
        status:
          type: string
          enum: [active, inactive, discontinued]
        supplierId:
          type: ["integer", "null"]
        createdBy:
          type: ["integer", "null"]
        updatedBy:
          type: ["integer", "null"]
        deletedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProductInput:
      type: object
      required: [name, price, stock]
      properties:
        name:
          type: string
        description:
          type: string
        sku:
          type: string
        barcode:
          type: string
        hsnCode:
          type: string
        brand:
          type: string
        unit:
          type: string
        weight:
          type: number
          format: float
        size:
          type: string
        color:
          type: string
        price:
          type: number
          format: float
        salePrice:
          type: number
          format: float
        mrp:
          type: number
          format: float
        purchasePrice:
          type: number
          format: float
        costPrice:
          type: number
          format: float
        gstRate:
          type: number
          format: float
        stock:
          type: integer
        minStockAlert:
          type: integer
        maxStock:
          type: integer
        trackInventory:
          type: boolean
        allowNegativeStock:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        imageUrl:
          type: string
        slug:
          type: string
        seoTitle:
          type: string
        seoDescription:
          type: string
        publishOnline:
          type: boolean
        featuredProduct:
          type: boolean
        barcodeType:
          type: string
        labelWidth:
          type: number
          format: float
        labelHeight:
          type: number
          format: float
        status:
          type: string
          enum: [active, inactive, discontinued]
        supplierId:
          type: integer

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        sku:
          type: ["string", "null"]
        barcode:
          type: ["string", "null"]
        hsnCode:
          type: ["string", "null"]
        brand:
          type: ["string", "null"]
        unit:
          type: ["string", "null"]
        weight:
          type: ["number", "null"]
          format: float
        size:
          type: ["string", "null"]
        color:
          type: ["string", "null"]
        price:
          type: number
          format: float
        salePrice:
          type: ["number", "null"]
          format: float
        mrp:
          type: ["number", "null"]
          format: float
        purchasePrice:
          type: ["number", "null"]
          format: float
        costPrice:
          type: ["number", "null"]
          format: float
        gstRate:
          type: ["number", "null"]
          format: float
        stock:
          type: integer
        minStockAlert:
          type: ["integer", "null"]
        maxStock:
          type: ["integer", "null"]
        trackInventory:
          type: boolean
        allowNegativeStock:
          type: boolean
        categoryId:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        slug:
          type: ["string", "null"]
        seoTitle:
          type: ["string", "null"]
        seoDescription:
          type: ["string", "null"]
        publishOnline:
          type: boolean
        featuredProduct:
          type: boolean
        barcodeType:
          type: ["string", "null"]
        labelWidth:
          type: ["number", "null"]
          format: float
        labelHeight:
          type: ["number", "null"]
          format: float
        isActive:
          type: boolean
        status:
          type: string
          enum: [active, inactive, discontinued]
        supplierId:
          type: ["integer", "null"]

    OrderItem:
      type: object
      required: [productId, productName, quantity, unitPrice, subtotal]
      properties:
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: float
        subtotal:
          type: number
          format: float

    Order:
      type: object
      required: [id, tenantId, orderNumber, status, subtotal, tax, total, items, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum: [pending, completed, cancelled, refunded]
        subtotal:
          type: number
          format: float
        tax:
          type: number
          format: float
        total:
          type: number
          format: float
        paymentMethod:
          type: ["string", "null"]
        customerName:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        cashierId:
          type: ["integer", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time

    OrderItemInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer

    OrderInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItemInput"
        paymentMethod:
          type: string
        customerName:
          type: string
        notes:
          type: string
        tax:
          type: number
          format: float

    OrderUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [pending, completed, cancelled, refunded]
        paymentMethod:
          type: string
        notes:
          type: string

    DashboardSummary:
      type: object
      required: [todayRevenue, todayOrders, totalProducts, totalCustomers, revenueChange, ordersChange]
      properties:
        todayRevenue:
          type: number
          format: float
        todayOrders:
          type: integer
        totalProducts:
          type: integer
        totalCustomers:
          type: integer
        revenueChange:
          type: number
          format: float
        ordersChange:
          type: number
          format: float

    SalesByDay:
      type: object
      required: [date, revenue, orders]
      properties:
        date:
          type: string
        revenue:
          type: number
          format: float
        orders:
          type: integer

    TopProduct:
      type: object
      required: [productId, productName, totalSold, totalRevenue]
      properties:
        productId:
          type: integer
        productName:
          type: string
        totalSold:
          type: integer
        totalRevenue:
          type: number
          format: float
