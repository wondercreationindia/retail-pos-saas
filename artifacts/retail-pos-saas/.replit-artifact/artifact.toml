kind = "web"
previewPath = "/"
title = "Retail POS SaaS"
version = "1.0.0"
id = "artifacts/retail-pos-saas"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25571

[services.development]
run = "pnpm --filter @workspace/retail-pos-saas run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/retail-pos-saas", "run", "build" ]
publicDir = "artifacts/retail-pos-saas/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25571"
BASE_PATH = "/"
